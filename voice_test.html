<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tomer — Voice AI Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 28px; color: #1e3a5f; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 28px; }
    .key-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      direction: ltr;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    .key-input:focus { border-color: #3b82f6; }
    .call-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 52px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
    }
    .call-btn:hover { background: #16a34a; transform: scale(1.05); }
    .call-btn.active {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    .call-btn.active:hover { background: #dc2626; }
    .call-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
    }
    .status {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
      min-height: 24px;
    }
    .status.idle { color: #64748b; }
    .status.connecting { color: #f59e0b; }
    .status.active { color: #22c55e; }
    .status.ended { color: #64748b; }
    .status.error { color: #ef4444; }
    .transcript-box {
      margin-top: 24px;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 16px;
      max-height: 250px;
      overflow-y: auto;
      text-align: right;
      display: none;
    }
    .transcript-box.visible { display: block; }
    .transcript-box h3 { font-size: 13px; color: #94a3b8; margin-bottom: 10px; }
    .msg { margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
    .msg .role { font-weight: 700; }
    .msg .role.assistant { color: #3b82f6; }
    .msg .role.user { color: #22c55e; }
    .hint { margin-top: 20px; font-size: 12px; color: #94a3b8; }
    .hint a { color: #3b82f6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>תומר — ברק שירותים</h1>
    <p class="subtitle">Voice AI Re-activation Agent — Web Test</p>

    <input
      type="text"
      id="publicKey"
      class="key-input"
      placeholder="Paste your Vapi Public Key here"
      dir="ltr"
      value="ae93dc6a-a162-4357-b9c2-dfb0561fe3d1"
    />

    <div>
      <button class="call-btn" id="callBtn" onclick="toggleCall()">📞</button>
    </div>

    <div class="status idle" id="status">לחץ להתחיל שיחה עם תומר</div>

    <div class="transcript-box" id="transcript">
      <h3>תמלול שיחה</h3>
      <div id="messages"></div>
    </div>

    <p class="hint">
      Public Key נמצא ב-<a href="https://dashboard.vapi.ai" target="_blank">dashboard.vapi.ai</a>
      → Organization Settings
    </p>
  </div>

  <script type="module">
    import Vapi from "https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/+esm";

    let vapi = null;
    let callActive = false;

    const systemPrompt = `CRITICAL DIRECTIVE: You MUST think, speak, and generate text EXCLUSIVELY in the Hebrew alphabet (עברית). DO NOT use English letters to write Hebrew words (no transliteration). DO NOT translate to English. Respond with short, natural Israeli Hebrew phrases. כל מילה חייבת להיכתב באותיות עבריות בלבד. אסור להשתמש באותיות לטיניות.

אתה תומר, מגייס צעיר ואנרגטי בחברת "ברק שירותים". התפקיד שלך להתקשר ללידים ישנים שהתעניינו בעבר בעבודה באילת, ולבדוק אם הם עדיין רלוונטיים.

כללים קריטיים:
1. דבר רק בעברית. כל מילה באותיות עבריות. אף פעם לא באנגלית או בתעתיק.
2. השתמש בעברית מדוברת וטבעית עם סלנג קליל ("אהלן", "מה קורה", "בכיף").
3. תשובות קצרות בלבד — משפט אחד או שניים מקסימום. חכה לתשובה.
4. אם מפסיקים אותך, תפסיק לדבר מיד ותקשיב.
5. אל תישמע כמו רובוט. אתה תומר — בנאדם אמיתי שמתקשר.
6. התאם את האנרגיה שלך לשיחה. אם עסוקים, תקצר. אם פתוחים, תהיה חם.

מהלך השיחה:

שלב 1 (פתיחה):
"אהלן, מדבר תומר מברק שירותים, מה קורה?"
→ חכה לתשובה.

שלב 2 (הצעה):
"אני מתקשר כי התעניינת אצלנו בעבר לגבי עבודה באילת. לקראת העונה פתחנו מלא תקנים חדשים במלונות עם אחלה מגורים מסובסדים. רציתי לשאול אם אתה עדיין מחפש משהו או שכבר הסתדרת?"
→ חכה לתשובה.

שלב 3 (טיפול בתשובות):

אם כן (עדיין מחפש):
"איזה יופי. תראה, כדי לא לחפור לך עכשיו בטלפון, אני אשלח לך הודעה לוואטסאפ עם כל הפרטים והמשרות הפנויות, סגור?"
→ חכה לתשובה.

אם לא (מצא עבודה / לא רלוונטי):
"וואלה מעולה אחי, שיהיה המון בהצלחה! אם תצטרך משהו בעתיד אנחנו פה. יום טוב!"
→ סיים שיחה.

אם אולי / לא בטוח:
"בלי לחץ, אני רק אשלח לך הודעה בוואטסאפ עם הפרטים ותסתכל כשנוח לך. זה בסדר?"
→ חכה לתשובה.

אם עצבני / לא בזמן טוב:
"סליחה על ההפרעה, אחי. בהצלחה ויום טוב!"
→ סיים שיחה.

שלב 4 (סגירה — הסכים לוואטסאפ):
"יאללה, שולח לך עכשיו. נדבר שם!"
→ סיים שיחה.`;

    const assistantConfig = {
      model: {
        provider: "anthropic",
        model: "claude-sonnet-4-20250514",
        messages: [{ role: "system", content: systemPrompt }],
      },
      voice: {
        provider: "azure",
        voiceId: "he-IL-AvriNeural",
      },
      firstMessage: "אהלן, מדבר תומר מברק שירותים, מה קורה?",
      transcriber: {
        provider: "gladia",
        language: "he",
      },
    };

    function setStatus(text, cls) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.className = "status " + cls;
    }

    function addMessage(role, text) {
      const box = document.getElementById("transcript");
      const msgs = document.getElementById("messages");
      box.classList.add("visible");
      const div = document.createElement("div");
      div.className = "msg";
      const label = role === "assistant" ? "תומר" : "אתה";
      div.innerHTML = `<span class="role ${role}">${label}:</span> ${text}`;
      msgs.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function startCall() {
      const key = document.getElementById("publicKey").value.trim();
      if (!key) {
        setStatus("הכנס Vapi Public Key קודם", "error");
        document.getElementById("publicKey").focus();
        return;
      }

      const btn = document.getElementById("callBtn");
      btn.disabled = true;
      setStatus("מתחבר...", "connecting");

      try {
        vapi = new Vapi(key);
      } catch (e) {
        setStatus("שגיאה באתחול SDK: " + e.message, "error");
        btn.disabled = false;
        return;
      }

      vapi.on("call-start", () => {
        callActive = true;
        btn.disabled = false;
        btn.classList.add("active");
        btn.textContent = "🔴";
        setStatus("שיחה פעילה — תומר מדבר!", "active");
      });

      vapi.on("call-end", () => {
        callActive = false;
        btn.classList.remove("active");
        btn.textContent = "📞";
        btn.disabled = false;
        setStatus("השיחה הסתיימה", "ended");
      });

      vapi.on("message", (msg) => {
        if (msg.type === "transcript" && msg.transcriptType === "final") {
          addMessage(msg.role, msg.transcript);
        }
      });

      vapi.on("error", (err) => {
        console.error("Vapi error:", err);
        setStatus("שגיאה: " + (err.message || JSON.stringify(err)), "error");
        callActive = false;
        btn.classList.remove("active");
        btn.textContent = "📞";
        btn.disabled = false;
      });

      vapi.start(assistantConfig).catch((err) => {
        setStatus("שגיאה בהתחלת שיחה: " + (err.message || err), "error");
        btn.disabled = false;
      });
    }

    function stopCall() {
      if (vapi) {
        vapi.stop();
      }
    }

    // Expose toggleCall globally for the onclick handler
    window.toggleCall = function () {
      if (callActive) {
        stopCall();
      } else {
        startCall();
      }
    };
  </script>
</body>
</html>
